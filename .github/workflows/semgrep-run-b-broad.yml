name: Semgrep Run B Broad Ruleset

on:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  semgrep-run-b:
    name: Semgrep OSS Run B Broad r/all
    runs-on: ubuntu-latest

    container:
      image: semgrep/semgrep:1.168.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep broad public ruleset on Java testcode only
        run: |
          mkdir -p results
          semgrep scan \
            --config r/all \
            --include='*.java' \
            --sarif \
            --output results/Benchmark_1.2-Semgrep-RunB-rall.sarif \
            --metrics=off \
            src/main/java/org/owasp/benchmark/testcode || true

      - name: Upload Semgrep Run B SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-run-b-rall-sarif
          path: results/Benchmark_1.2-Semgrep-RunB-rall.sarif

      - name: Upload Semgrep Run B SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results/Benchmark_1.2-Semgrep-RunB-rall.sarif
          category: semgrep-run-b-rall
