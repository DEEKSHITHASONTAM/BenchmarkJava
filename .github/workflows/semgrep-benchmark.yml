name: Semgrep BenchmarkJava Scan

on:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  semgrep:
    name: Semgrep CE Benchmark Scan
    runs-on: ubuntu-latest

    container:
      image: semgrep/semgrep:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep and generate SARIF
        run: |
          mkdir -p results
          semgrep scan \
            --config https://semgrep.dev/p/r2c-security-audit \
            --sarif \
            --output results/Benchmark_1.2-Semgrep.sarif \
            --metrics=off \
            . || true

      - name: Upload Semgrep SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-benchmark-sarif
          path: results/Benchmark_1.2-Semgrep.sarif

      - name: Upload Semgrep results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results/Benchmark_1.2-Semgrep.sarif
          category: semgrep-benchmark
